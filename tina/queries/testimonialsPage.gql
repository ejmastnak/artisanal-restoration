query myTestimonialsPage($relativePath: String!) {
  testimonialsPage(relativePath: $relativePath) {
    ... on Document {
      _sys {
        filename
        basename
        hasReferences
        breadcrumbs
        path
        relativePath
        extension
      }
      id
      _values
    }
    ...MyTestimonialsPageParts
  }
}

fragment MyTestimonialsPageParts on TestimonialsPage {
  __typename
  head {
    __typename
    title
    description
  }

  h1
  description
  closingText

}
