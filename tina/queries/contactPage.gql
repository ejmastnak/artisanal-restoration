query myContactPage($relativePath: String!) {
  contactPage(relativePath: $relativePath) {
    ... on Document {
      _sys {
        filename
        basename
        hasReferences
        breadcrumbs
        path
        relativePath
        extension
      }
      id
      _values
    }
    ...MyContactPageParts
  }
}

fragment MyContactPageParts on ContactPage {
  __typename
  head {
    __typename
    title
    description
  }
  h1
  intro
  contactFormHeading
  contactForm {
    __typename
    contactFormNameLabel
    contactFormNamePlaceholder
    contactFormMessageLabel
    contactFormMessagePlaceholder
    contactFormContactMethodLabel
    contactFormPhoneOptionLabel
    contactFormEmailOptionLabel
    contactFormPhoneLabel
    contactFormPhonePlaceholder
    contactFormEmailLabel
    contactFormEmailPlaceholder
    contactFormSubmitButtonText
  }
  contactDirectlyHeading
  contactDirectlyText
  emailText
  email
  phoneText
  phone
  phoneMachineReadable
  nextStepsHeading
  nextStepsBody
}
