query myServicesPage($relativePath: String!) {
  servicesPage(relativePath: $relativePath) {
    ... on Document {
      _sys {
        filename
        basename
        hasReferences
        breadcrumbs
        path
        relativePath
        extension
      }
      id
      _values
    }
    ...MyServicesPageParts
  }
}

fragment MyServicesPageParts on ServicesPage {
  __typename
  head {
    __typename
    title
    description
  }

  h1
  summary
  additionalServicesText
  contactButtonText
  servicesImage
  servicesImageAlt

  servicesListHeading
  servicesList {
    __typename
    serviceHeading
    serviceDescription
    serviceImage
    serviceImageAlt
  }

  workingWithUsHeading
  workingWithUsBody

}
